<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA - Académie Universitaire de Révision Avancée</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Playfair Display', serif; }
        .gradient-aura { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%); }
        .gradient-dark { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4c1d95 100%); }
        .card-hover { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgba(99, 102, 241, 0.25); }
        .glass-dark { background: rgba(30, 27, 75, 0.95); backdrop-filter: blur(20px); }
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .toast { position: fixed; bottom: 24px; right: 24px; padding: 16px 28px; border-radius: 16px; color: white; font-weight: 600; z-index: 1000; transform: translateY(120px); transition: all 0.4s; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .toast.show { transform: translateY(0); }
        .toast-success { background: linear-gradient(135deg, #10b981, #059669); }
        .toast-error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .option-selected { border-color: #6366f1; background-color: #f5f3ff; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50">

<div id="toast-container"></div>

<div id="landingSection" class="min-h-screen gradient-dark flex flex-col items-center justify-center text-center p-6">
    <div class="w-20 h-20 gradient-aura rounded-2xl flex items-center justify-center shadow-2xl mb-8 rotate-12">
        <i class="fas fa-atom text-white text-4xl"></i>
    </div>
    <h1 class="text-6xl font-display font-bold text-white mb-4">AURA</h1>
    <p class="text-xl text-indigo-200 mb-10 max-w-2xl">L'excellence académique pour les étudiants en pharmacie et médecine.</p>
    <button onclick="showDashboard()" class="bg-white text-indigo-600 px-10 py-4 rounded-2xl font-bold text-lg hover:scale-105 transition shadow-xl">
        Entrer dans l'Académie
    </button>
</div>

<div id="dashboardSection" class="hidden min-h-screen">
    <nav class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-30">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 gradient-aura rounded-lg flex items-center justify-center">
                <i class="fas fa-atom text-white"></i>
            </div>
            <span class="text-xl font-display font-bold text-slate-800">AURA</span>
        </div>
        <button onclick="openModal('simulationModal')" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-indigo-700 transition">
            <i class="fas fa-play mr-2"></i> Simulation
        </button>
    </nav>

    <main class="p-8 max-w-7xl mx-auto">
        <div id="quizContainerSection" class="hidden fade-in max-w-3xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <div id="timer" class="text-indigo-600 font-mono font-bold text-xl bg-white px-4 py-2 rounded-lg border">00:00</div>
                <div id="progressText" class="text-slate-500 font-bold">Question 1/0</div>
            </div>
            
            <div id="questionBox" class="bg-white rounded-3xl p-8 shadow-xl border border-slate-100">
                </div>

            <div class="flex justify-between mt-8">
                <button onclick="prevQuestion()" class="text-slate-500 font-bold hover:text-indigo-600">Precedent</button>
                <button onclick="nextQuestion()" id="nextBtn" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-indigo-100">Suivant</button>
            </div>
        </div>
    </main>
</div>

<div id="simulationModal" class="hidden fixed inset-0 z-50 items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
    <div class="bg-white rounded-3xl w-full max-w-md p-8 shadow-2xl scale-in">
        <h2 class="text-2xl font-bold text-slate-800 mb-6">Configuration du Quiz</h2>
        
        <label class="block text-sm font-medium text-slate-500 mb-2">Choisir les cours</label>
        <div id="simCourseList" class="max-h-48 overflow-y-auto border border-slate-200 rounded-2xl p-2 bg-slate-50 custom-scrollbar mb-6">
            </div>

        <label class="block text-sm font-medium text-slate-500 mb-2">Nombre de questions</label>
        <input type="number" id="simNum" value="10" class="w-full p-4 border border-slate-200 rounded-2xl mb-6 outline-none focus:ring-2 focus:ring-indigo-500">

        <div class="flex gap-4">
            <button onclick="closeModal('simulationModal')" class="flex-1 py-4 text-slate-500 font-bold">Annuler</button>
            <button onclick="startSimulation()" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-bold">Demarrer</button>
        </div>
    </div>
</div>

<script>
// --- DONNEES ---
var COURSES_DATA = [
    { id: 1, course: "Pharmacologie", text: "Quel est l'antidote du paracetamol ?", options: ["Atropine", "N-acetylcysteine", "Naloxone", "Flumazenil"], correct: 1 },
    { id: 2, course: "Toxicologie", text: "L intoxication au monoxyde de carbone se traite par :", options: ["Oxygene pur", "Heparine", "Vitamine K"], correct: 0 },
    { id: 3, course: "Pharmacologie", text: "L aspirine agit par inhibition de :", options: ["La COX", "La pompe a protons", "Les recepteurs H2"], correct: 0 },
    { id: 4, course: "Chimie", text: "Le pH du sang est environ de :", options: ["6.5", "7.0", "7.4", "8.0"], correct: 2 }
];

// --- ETAT ---
var currentQuestions = [];
var currentQuestionIndex = 0;
var userAnswers = [];
var userPlaylist = JSON.parse(localStorage.getItem('aura_playlist')) || [];

// --- FONCTIONS CORE ---

function showToast(msg, type) {
    if (!type) type = 'success';
    var container = document.getElementById('toast-container');
    var toast = document.createElement('div');
    toast.className = 'toast show toast-' + type;
    toast.innerText = msg;
    container.appendChild(toast);
    setTimeout(function() {
        toast.classList.remove('show');
        setTimeout(function() { toast.remove(); }, 400);
    }, 3000);
}

function showDashboard() {
    document.getElementById('landingSection').classList.add('hidden');
    document.getElementById('dashboardSection').classList.remove('hidden');
}

function openModal(id) {
    document.getElementById(id).classList.remove('hidden');
    if (id === 'simulationModal') loadCheckboxes();
}

function closeModal(id) {
    document.getElementById(id).classList.add('hidden');
}

function loadCheckboxes() {
    var container = document.getElementById('simCourseList');
    var seen = {};
    var html = '';
    for (var i = 0; i < COURSES_DATA.length; i++) {
        var c = COURSES_DATA[i].course;
        if (!seen[c]) {
            seen[c] = true;
            html += '<label class="flex items-center p-3 hover:bg-white rounded-xl cursor-pointer transition-all">';
            html += '<input type="checkbox" name="simSelectedCourses" value="' + c + '" class="w-5 h-5 text-indigo-600 rounded mr-4">';
            html += '<span class="text-slate-700 font-semibold">' + c + '</span></label>';
        }
    }
    container.innerHTML = html;
}

function togglePlaylist(id) {
    var idx = userPlaylist.indexOf(id);
    if (idx === -1) {
        userPlaylist.push(id);
        showToast("Ajoute a votre playlist !");
    } else {
        userPlaylist.splice(idx, 1);
        showToast("Retire de la playlist", "error");
    }
    localStorage.setItem('aura_playlist', JSON.stringify(userPlaylist));
    renderQuestion();
}

function startSimulation() {
    var checkboxes = document.querySelectorAll('input[name="simSelectedCourses"]:checked');
    var selected = [];
    for (var i = 0; i < checkboxes.length; i++) {
        selected.push(checkboxes[i].value);
    }
    if (selected.length === 0) {
        showToast("Choisissez au moins un cours", "error");
        return;
    }

    currentQuestions = [];
    for (var j = 0; j < COURSES_DATA.length; j++) {
        if (selected.indexOf(COURSES_DATA[j].course) !== -1) {
            currentQuestions.push(COURSES_DATA[j]);
        }
    }

    var num = parseInt(document.getElementById('simNum').value) || 10;
    currentQuestions.sort(function() { return Math.random() - 0.5; });
    currentQuestions = currentQuestions.slice(0, num);

    currentQuestionIndex = 0;
    userAnswers = [];
    for (var k = 0; k < currentQuestions.length; k++) {
        userAnswers.push(null);
    }
    
    closeModal('simulationModal');
    document.getElementById('quizContainerSection').classList.remove('hidden');
    renderQuestion();
}

function renderQuestion() {
    var q = currentQuestions[currentQuestionIndex];
    var box = document.getElementById('questionBox');
    var isSaved = userPlaylist.indexOf(q.id) !== -1;

    var html = '<div class="flex justify-between items-start mb-6">';
    html += '<h3 class="text-2xl font-bold text-slate-800 leading-tight">' + q.text + '</h3>';
    html += '<button onclick="togglePlaylist(' + q.id + ')" class="p-2 hover:bg-slate-50 rounded-full transition-colors">';
    html += '<i class="' + (isSaved ? 'fa-solid' : 'fa-regular') + ' fa-bookmark text-xl ' + (isSaved ? 'text-indigo-600' : 'text-slate-300') + '"></i></button></div>';
    
    html += '<div class="space-y-4">';
    for (var i = 0; i < q.options.length; i++) {
        var opt = q.options[i];
        var selected = userAnswers[currentQuestionIndex] === i ? 'option-selected' : 'border-slate-100';
        html += '<div onclick="selectOption(' + i + ')" class="p-4 border-2 rounded-2xl cursor-pointer transition-all flex items-center hover:border-indigo-200 ' + selected + '">';
        html += '<span class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center mr-4 font-bold text-slate-500">' + String.fromCharCode(65 + i) + '</span>';
        html += '<span class="text-slate-700 font-medium">' + opt + '</span></div>';
    }
    html += '</div>';
    
    box.innerHTML = html;
    document.getElementById('progressText').innerText = 'Question ' + (currentQuestionIndex + 1) + '/' + currentQuestions.length;
}

function selectOption(idx) {
    userAnswers[currentQuestionIndex] = idx;
    renderQuestion();
}

function nextQuestion() {
    if (currentQuestionIndex < currentQuestions.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
    } else {
        showToast("Quiz termine !");
    }
}

function prevQuestion() {
    if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        renderQuestion();
    }
}
</script>
</body>
</html>
